<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .controller { fill: #fff; stroke: #ff9520; stroke-width: 2; rx: 8; }
      .text { fill: #2d3748; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 500; text-anchor: middle; }
      .label { fill: #718096; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; }
      .arrow { stroke: #ff9520; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9520" />
    </marker>
  </defs>

  <!-- S3 Controller -->
  <rect class="controller" x="50" y="30" width="180" height="60" />
  <text class="text" x="140" y="65">S3 Controller</text>

  <!-- Arrow -->
  <path class="arrow" d="M 235 60 L 355 60" />
  <text class="label" x="370" y="50">Manages Buckets and</text>
  <text class="label" x="370" y="65">their attributes</text>

  <!-- RDS Controller -->
  <rect class="controller" x="50" y="110" width="180" height="60" />
  <text class="text" x="140" y="145">RDS Controller</text>

  <!-- Arrow -->
  <path class="arrow" d="M 235 140 L 355 140" />
  <text class="label" x="370" y="130">Manages DBInstances,</text>
  <text class="label" x="370" y="145">DBClusters, etc.</text>

  <!-- DynamoDB Controller -->
  <rect class="controller" x="50" y="190" width="180" height="60" />
  <text class="text" x="140" y="225">DynamoDB Controller</text>

  <!-- Arrow -->
  <path class="arrow" d="M 235 220 L 355 220" />
  <text class="label" x="370" y="210">Manages Tables, Backups,</text>
  <text class="label" x="370" y="225">GlobalTables, etc.</text>
</svg>
