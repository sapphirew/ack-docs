<svg viewBox="0 0 820 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #fff; stroke: #ff9520; stroke-width: 2; rx: 8; }
      .text { fill: #2d3748; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 500; }
      .arrow { stroke: #718096; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { fill: #4a5568; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#718096" />
    </marker>
  </defs>

  <!-- User -->
  <rect class="box" x="10" y="75" width="90" height="45" />
  <text class="text" x="55" y="102" text-anchor="middle">User</text>

  <!-- Arrow 1 -->
  <path class="arrow" d="M 110 97.5 L 165 97.5" />
  <text class="label" x="137" y="90" text-anchor="middle">kubectl apply</text>

  <!-- Kubernetes API -->
  <rect class="box" x="175" y="75" width="110" height="45" />
  <text class="text" x="230" y="102" text-anchor="middle">Kubernetes</text>

  <!-- Arrow 2 -->
  <path class="arrow" d="M 295 97.5 L 350 97.5" />

  <!-- ACK Controller -->
  <rect class="box" x="360" y="75" width="110" height="45" />
  <text class="text" x="415" y="102" text-anchor="middle">Controller</text>

  <!-- Arrow 3 -->
  <path class="arrow" d="M 480 97.5 L 535 97.5" />
  <text class="label" x="507" y="90" text-anchor="middle">SDK calls</text>

  <!-- AWS API -->
  <rect class="box" x="545" y="75" width="90" height="45" />
  <text class="text" x="590" y="102" text-anchor="middle">AWS API</text>

  <!-- Return Arrow -->
  <path class="arrow" d="M 590 130 L 590 155 L 415 155 L 415 130" />
  <text class="label" x="502" y="173" text-anchor="middle">Status updates</text>
</svg>
