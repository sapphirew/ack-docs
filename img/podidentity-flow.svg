<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #fff; stroke: #4a5568; stroke-width: 2; rx: 8; }
      .pod-box { fill: #fff7ed; stroke: #ff9520; stroke-width: 2.5; rx: 8; }
      .eks-box { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
      .iam-box { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .aws-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .text { fill: #1e293b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; }
      .small-text { fill: #64748b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #ff9520; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-text { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9520" />
    </marker>
  </defs>

  <!-- ACK Controller Pod -->
  <rect class="pod-box" x="150" y="20" width="200" height="60" />
  <text class="text" x="250" y="45">ACK Controller Pod</text>
  <text class="small-text" x="250" y="63">with Service Account</text>

  <!-- Arrow 1 -->
  <path class="arrow" d="M 250 85 L 250 115" />
  <text class="arrow-text" x="280" y="103">Uses</text>

  <!-- Pod Identity Association -->
  <rect class="eks-box" x="150" y="120" width="200" height="60" />
  <text class="text" x="250" y="145">Pod Identity Association</text>
  <text class="small-text" x="250" y="163">Configured in EKS</text>

  <!-- Arrow 2 -->
  <path class="arrow" d="M 250 185 L 250 215" />
  <text class="arrow-text" x="300" y="203">Provides</text>

  <!-- Temporary Credentials -->
  <rect class="box" x="150" y="220" width="200" height="60" />
  <text class="text" x="250" y="245">Temporary Credentials</text>
  <text class="small-text" x="250" y="263">Auto-rotated hourly</text>

  <!-- Arrow 3 -->
  <path class="arrow" d="M 250 285 L 250 315" />
  <text class="arrow-text" x="295" y="303">Assumes</text>

  <!-- IAM Role -->
  <rect class="iam-box" x="150" y="320" width="200" height="60" />
  <text class="text" x="250" y="345">IAM Role</text>
  <text class="small-text" x="250" y="363">With IAM Policies</text>

  <!-- Arrow 4 -->
  <path class="arrow" d="M 250 385 L 250 415" />
  <text class="arrow-text" x="290" y="403">Grants</text>

  <!-- AWS Permissions -->
  <rect class="aws-box" x="150" y="420" width="200" height="60" />
  <text class="text" x="250" y="445">AWS Service APIs</text>
  <text class="small-text" x="250" y="463">S3, RDS, DynamoDB, etc.</text>

</svg>
